[MeasureBand8]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Type=Band
BandIdx=8

[MeasureBand9]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudio
Type=Band
BandIdx=9

; ==========================================
; METERS (Affichage visuel des barres)
; ==========================================

[MeterBar0]
Meter=Bar
MeasureName=MeasureBand0
X=0
Y=0
W=#BarW#
H=#BarH#
BarColor=#BarColor#
SolidColor=255,255,255,30
BarOrientation=Vertical

[MeterBar1]
Meter=Bar
MeasureName=MeasureBand1
X=5R
Y=0
W=#BarW#
H=#BarH#
BarColor=#BarColor#
SolidColor=255,255,255,30
BarOrientation=Vertical

