[Rainmeter]
Update=1000
AccurateText=1

; --- MESURES (Récupération des données) ---

[MeasurePlayer]
Measure=NowPlaying
; C'est ici qu'on dit à Rainmeter de cibler MediaMonkey
PlayerName=CAD
PlayerType=TITLE

[MeasureArtist]
Measure=NowPlaying
PlayerName=[MeasurePlayer]
PlayerType=ARTIST

[MeasureState]
Measure=NowPlaying
PlayerName=[MeasurePlayer]
PlayerType=STATE

; --- METERS (Affichage et Contrôles) ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,250,90,8 | Fill Color 30,30,30,220 | Stroke Width 10

[MeterTrackAndArtist]
Meter=String
MeasureName=MeasurePlayer
MeasureName2=MeasureArtist
X=125
Y=15
StringAlign=Center
FontColor=255,255,255
FontFace=Segoe UI
FontSize=11
AntiAlias=1
Text="%1 - %2"
ClipString=1
W=230

[MeterPrevious]
Meter=String
X=65
Y=55
FontColor=200,200,200
FontFace=Segoe UI
FontSize=12
AntiAlias=1
Text="|<<"
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Previous"]

[MeterPlayPause]
Meter=String
X=125
Y=55
StringAlign=Center
FontColor=255,255,255
FontFace=Segoe UI
FontSize=12
AntiAlias=1
; Utilise une formule simple pour afficher Play ou Pause selon l'état
Text="Play/Pause"
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "PlayPause"]

[MeterNext]
Meter=String
X=185
Y=55
FontColor=200,200,200
FontFace=Segoe UI
FontSize=12
AntiAlias=1
Text=">>|"
LeftMouseUpAction=[!CommandMeasure MeasurePlayer "Next"]