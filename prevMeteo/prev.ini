[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
FontName=Segoe UI
FontColor=255,255,255,255
FontColorDim=255,255,255,150

; Liste de substitution pour transformer les codes Open-Meteo en noms de fichiers images
; Format : "Code Météo":"Nom de l'image"
TableauIcones="^0$":"soleil","^1$":"soleil","^2$":"nuage","^3$":"nuage","^45$":"brouillard","^48$":"brouillard","^51$":"pluie","^53$":"pluie","^55$":"pluie","^61$":"pluie","^63$":"pluie","^65$":"pluie","^80$":"pluie","^81$":"pluie","^95$":"orage"

; ==========================================
; MESURE PARENTE (Open-Meteo API)
; ==========================================

[MeasureParent]
Measure=WebParser
; On demande la météo actuelle + les prévisions horaires pour la température et le code météo
URL=https://api.open-meteo.com/v1/forecast?latitude=49.04&longitude=1.80&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&forecast_hours=7
; Capture : Temp Actuelle (1), Code Actuel (2), Temp +3h (3), Code +3h (4), Temp +6h (5), Code +6h (6)
RegExp=(?siU)"temperature_2m":\[(.*),.*,.*,(.*),.*,(.*),.*\].*"weather_code":\[(.*),.*,.*,(.*),.*,.*,(.*)\]
UpdateRate=600


; ==========================================
; MESURES ENFANTS
; ==========================================

; --- Météo Actuelle ---
[MeasureTempActuelle]
Measure=WebParser
Url=[MeasureParent]
StringIndex=1

[MeasureCodeActuel]
Measure=WebParser
Url=[MeasureParent]
StringIndex=4
RegExpSubstitute=1
Substitute=#TableauIcones#

; --- Prévision +3h ---
[MeasureTemp3h]
Measure=WebParser
Url=[MeasureParent]
StringIndex=2

[MeasureCode3h]
Measure=WebParser
Url=[MeasureParent]
StringIndex=5
RegExpSubstitute=1
Substitute=#TableauIcones#

; --- Prévision +6h ---
[MeasureTemp6h]
Measure=WebParser
Url=[MeasureParent]
StringIndex=3

[MeasureCode6h]
Measure=WebParser
Url=[MeasureParent]
StringIndex=6
RegExpSubstitute=1
Substitute=#TableauIcones#


; ==========================================
; AFFICHAGE VISUEL
; ==========================================

[MeterFond]
Meter=Shape
Shape=Rectangle 0,0,380,110,10 | Fill Color 0,0,0,120 | Stroke Color 0,0,0,0

; --- BLOC ACTUEL ---
[MeterVille]
Meter=String
X=15
Y=15
FontFace=#FontName#
FontSize=13
FontColor=#FontColor#
FontWeight=700
AntiAlias=1
Text=SAILLY

; Va chercher l'image dans @Resources/Icons/[NomTraduit].png
[MeterIconActuelle]
Meter=Image
MeasureName=MeasureCodeActuel
Path=#@#Icons\
X=15
Y=40
W=45
H=45

[MeterTempActuelle]
Meter=String
MeasureName=MeasureTempActuelle
X=75
Y=45
FontFace=#FontName#
FontSize=22
FontColor=#FontColor#
FontWeight=300
AntiAlias=1
Text=[MeasureTempActuelle:0]ḞC
DynamicVariables=1

; --- BLOC +3 HEURES ---
[MeterLabel3h]
Meter=String
X=210
Y=18
StringAlign=Center
FontFace=#FontName#
FontSize=9
FontColor=#FontColorDim#
FontWeight=600
AntiAlias=1
Text=+3h

[MeterIcon3h]
Meter=Image
MeasureName=MeasureCode3h
Path=#@#Icons\
X=188
Y=35
W=45
H=45

[MeterTemp3h]
Meter=String
MeasureName=MeasureTemp3h
X=210
Y=80
StringAlign=Center
FontFace=#FontName#
FontSize=11
FontColor=#FontColor#
FontWeight=400
AntiAlias=1
Text=[MeasureTemp3h:0]ḞC
DynamicVariables=1

; --- BLOC +6 HEURES ---
[MeterLabel6h]
Meter=String
X=310
Y=18
StringAlign=Center
FontFace=#FontName#
FontSize=9
FontColor=#FontColorDim#
FontWeight=600
AntiAlias=1
Text=+6h

[MeterIcon6h]
Meter=Image
MeasureName=MeasureCode6h
Path=#@#Icons\
X=288
Y=35
W=45
H=45

[MeterTemp6h]
Meter=String
MeasureName=MeasureTemp6h
X=310
Y=80
StringAlign=Center
FontFace=#FontName#
FontSize=11
FontColor=#FontColor#
FontWeight=400
AntiAlias=1
Text=[MeasureTemp6h:0]ḞC
DynamicVariables=1