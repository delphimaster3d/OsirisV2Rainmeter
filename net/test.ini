[Rainmeter]
Update=1000
Background=#@#fond_net.png
DynamicWindowSize=1

[MeasureNetIn]
Measure=NetIn

[MeasureNetOut]
Measure=NetOut

[MeterText]
Meter=String
MeasureName=MeasureNetIn
FontWeight=700
X=70
Y=10
W=200
H=100
FontColor=13,40,242,255
NumOfDecimals=0
AutoScale=1
Text="%1o"

[MeterText2]
Meter=String
MeasureName=MeasureNetOut
FontWeight=700
X=250
Y=10
W=200
H=100
FontColor=242,13,13,255
NumOfDecimals=0
AutoScale=1
Text="%1o"

[MeterNetLine]
Meter=Line
MeasureName=MeasureNetIn
MeasureName2=MeasureNetOut
X=38
y=32
w=270
h=160
LineCount=2
LineColor=13,40,242,255
LineColor2=242,13,13,255
LineWidth=1
AutoScale=1
AntiAlias=1
min=0
max=1200