[Rainmeter]
Update=1000

[MeasureTest]
Measure=Plugin
Plugin=WebParser
URL=https://api.openweathermap.org/data/2.5/weather?id=6612813&appid=b6aefe5faf1852b143b7c773a31ed0a4&units=metric&lang=fr
RegExp=(?siU)"temp":(.*?),"feels_like":(.*?).*?"description":"(.*?)"
Debug=2

[MeterTest]
Meter=String
MeasureName=MeasureTest
X=10
Y=10
w=500
h=30
FontSize=14
FontColor=255,255,255
Text="RÈsultat : %1"
SolidColor=0,0,0,75
